# 主題：改這裡即可切換研究領域，下次執行自動套用
# topic 用於 LLM 的相關性判斷；arxiv_query / s2_query 是實際送出的搜尋字串（高召回，靠後續排序+篩選收斂）
topic: "badminton/sports swing-technique motion analysis and AI coaching feedback; human pose & motion understanding, motion-language models (skeleton/motion-to-text, e.g. MotionGPT/MG-MotionLLM), action quality assessment (AQA), video action differencing (student-vs-coach), and evaluation methodology for coaching-feedback quality (faithfulness, expert agreement). Focus on INDIVIDUAL technique/biomechanics coaching; NOT tactical/broadcast match analysis or shuttlecock trajectory."

# 每晚閱讀篇數（每篇 ≈ 3 個 sonnet session）
papers_per_run: 3

# 篩選（Screening 階段）
screening:
  # 每晚保留幾篇「主題相關但跳脫目前進度」的探索/創新方向（其餘名額給貼近進度的核心論文）。
  # 例：papers_per_run=3 + exploration_slots=1 → 2 篇核心 + 1 篇探索。
  # 需有 research_profile.md 才生效（否則無從分辨「進度」，自動失效、全部當核心挑）。
  exploration_slots: 1

# Discovery 階段：搜尋字串、候選數量與時間範圍
discovery:
  # 用括號群組 OR（discovery 會包成 all:(...)）；新方向 + 羽球揮拍並存，靠 topic/rank/screen 收斂
  arxiv_query: '(badminton OR "action quality assessment" OR "motion captioning" OR "motion-language model" OR "video action differencing" OR "sports coaching feedback" OR "skill assessment")'
  s2_query: "sports action quality assessment skill assessment coaching feedback motion language model badminton swing technique"  # Semantic Scholar（去掉通用 pose/recognition 詞，減少通用 pose-action 論文洗版）
  candidates: 60            # 粗排前的候選池大小（拓寬題目後放大，避免羽球被新領域擠掉）
  recent_days: 365          # arXiv 只取最近 N 天（羽球領域論文較少，放寬到一年）
  min_year: 2022            # Semantic Scholar 最低年份

# 排序權重（Ranking 階段，haiku 評分用）
priority_mix:
  recency_weight: 0.4
  citation_weight: 0.4
  relevance_weight: 0.2

# 各 stage 使用的模型（有效果就好，不一定用最貴）
models:
  rank: haiku
  screen: opus
  read: sonnet
  extract: haiku       # 從 report.html 萃取 analysis.json（便宜）
  review: sonnet

reader:
  style: academic          # 固定 academic（不開放其他風格）
  language: zh-TW

# enrich 階段（純 Python，零額度）：公式轉 MathML + 從 PDF 抽圖 base64 內嵌
figures:
  enabled: true
  max_extract: 12          # 最多抽幾張原文圖表

# 被引前置文獻 backward（reader 的「研究脈絡與前置工作」，純 Python 零額度抓取）
# 注入 read prompt 的 input，不新增 LLM 呼叫；嚴格截斷以省 token。
references:
  enabled: true
  fetch_limit: 50          # 向 S2 抓多少筆 references（排序用，零額度）
  max_inject: 10           # 真正注入 prompt 的筆數（influential／高被引優先）
  abstract_top: 4          # 只有前 N 筆附摘要，其餘僅「標題＋年＋被引數」
  abstract_chars: 160      # 摘要截斷字數

# Evidence Checker forward（review 階段：後續引用本論文的文獻 → 支持/反駁/侷限/改進）
# 抓取純 Python 零額度，分類折進既有 review 呼叫；新論文無前向引用時退回 backward 角度。
evidence:
  enabled: true
  fetch_limit: 50
  max_inject: 12           # forward 引用注入筆數
  context_chars: 180       # 每筆只留最相關 1 句引用語境、截斷

reviewer:
  mode: quick              # quick | full | methodology-focus

sources:
  arxiv: true
  semantic_scholar: true

zotero_integration: false  # 預留
